name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Triggers the build when you push a tag like v1.0.0, v1.1.0, etc.
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab on GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # This step uploads the compiled APK to the GitHub Actions artifacts (private storage for your build)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # This step creates the GitHub Release and uploads the APK automatically when a tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
